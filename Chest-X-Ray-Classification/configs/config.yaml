data:
  data_dir: data/raw/chest_xray
  raw_dir: data/raw
  processed_dir: data/processed

model:
  name: densenet121
  num_classes: 2
  pretrained: true

training:
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
  early_stopping_patience: 5

image:
  size: 224
  normalize:
    mean: [0.4693, 0.4693, 0.4693]
    std: [0.2270, 0.2270, 0.2270]
